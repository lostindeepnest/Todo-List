<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="a simple todo list with good ui, easy on the eyes">
    <link rel="stylesheet" href="style.css">

    <title>To Do List</title>

    <link rel="icon" href="icons/duotone-checkmark-v6-large.svg">
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#ede7da">
</head>
<body>
    <main id="todo-list-body">

        <div id="top-section">

             <p id="date">Today</p>

             <div id="input-section">
                <input type="text" id="task-input" placeholder="enter your tasks...">
                <button id="add-task">ADD</button>
            </div>

        </div>

        <div id="dividing-line"></div>

        <section id="task-section">
            <ul id="task-list" >

            </ul>
        </section>
       
    </main>

    <script src="script.js"></script>
</body>
</html>
